<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Page not found — WalletLens</title>
    <link rel="icon" href="/favicon.ico" sizes="48x48">
    <script>
      // rafgraph/spa-github-pages SPA fallback.
      // Keep 1 segment on project pages (tia8910.github.io/Walletlens/...),
      // 0 segments on the apex domain (walletlens.live/...).
      var pathSegmentsToKeep =
        window.location.hostname.endsWith('github.io') ? 1 : 0;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
    <style>
      body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
             background: #071a0c; color: #e7eaf0; font-family: system-ui, -apple-system, sans-serif; text-align: center; }
      .wrap { padding: 2rem; max-width: 480px; }
      h1 { font-size: 3rem; margin: 0 0 0.5rem; color: #4ade80; }
      p { line-height: 1.6; color: rgba(255,255,255,0.75); }
      a { color: #4ade80; text-decoration: none; font-weight: 600; }
      a:hover { text-decoration: underline; }
      nav { margin-top: 1.5rem; display: flex; gap: 1.25rem; justify-content: center; flex-wrap: wrap; }
    </style>
  </head>
  <body>
    <!-- Visible only without JS — with JS the script above routes into the app -->
    <div class="wrap">
      <h1>404</h1>
      <p>This page doesn't exist — but your portfolio does. The page may have moved, or the address has a typo.</p>
      <nav>
        <a href="/">Home</a>
        <a href="/dashboard/">Dashboard</a>
        <a href="/blog/">Blog</a>
        <a href="/about/">About</a>
      </nav>
    </div>
  </body>
</html>
