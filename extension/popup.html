<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WalletLens Portfolio</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <!-- ── Header ── -->
  <header class="header">
    <div class="logo">
      <svg width="24" height="24" viewBox="0 0 64 64" fill="none" aria-hidden="true">
        <defs>
          <linearGradient id="wlg" x1="5" y1="5" x2="52" y2="52" gradientUnits="userSpaceOnUse">
            <stop offset="0"   stop-color="#4ade80"/>
            <stop offset="0.5" stop-color="#16a34a"/>
            <stop offset="1"   stop-color="#14532d"/>
          </linearGradient>
        </defs>
        <circle cx="27" cy="25" r="19" stroke="url(#wlg)" stroke-width="5.5"/>
        <rect x="14.5" y="26.5" width="5"   height="7.5"  rx="1.2" fill="url(#wlg)"/>
        <rect x="21.5" y="21"   width="5"   height="13"   rx="1.2" fill="url(#wlg)"/>
        <rect x="28.5" y="15.5" width="5"   height="18.5" rx="1.2" fill="url(#wlg)"/>
        <line x1="13.5" y1="39" x2="4" y2="55" stroke="url(#wlg)" stroke-width="5.5" stroke-linecap="round"/>
        <circle cx="40.5" cy="11.5" r="3.8" fill="#4ade80"/>
      </svg>
      <span class="logo-text">WalletLens</span>
    </div>
    <div style="display:flex;align-items:center;gap:6px">
      <button id="btn-refresh" class="btn-icon" title="Refresh">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3"/>
        </svg>
      </button>
      <span class="badge">Portfolio</span>
    </div>
  </header>

  <!-- ── No-data state ── -->
  <div id="no-data" class="state-panel" hidden>
    <svg class="no-data-icon" viewBox="0 0 48 48" width="48" height="48" aria-hidden="true">
      <circle cx="24" cy="24" r="23" stroke="#4ade80" stroke-width="1.5" fill="none" opacity="0.3"/>
      <path d="M14 28 Q24 18 34 28" stroke="#4ade80" stroke-width="2" fill="none" stroke-linecap="round"/>
      <circle cx="18" cy="22" r="2" fill="#4ade80" opacity="0.6"/>
      <circle cx="30" cy="22" r="2" fill="#4ade80" opacity="0.6"/>
    </svg>
    <p class="no-data-title">No portfolio data yet</p>
    <p class="no-data-sub">Open WalletLens to sync your portfolio to this extension.</p>
    <button id="btn-open-site" class="btn-primary">Open walletlens.live</button>
  </div>

  <!-- ── Portfolio data state ── -->
  <div id="portfolio" class="state-panel" hidden>
    <!-- Total value -->
    <section class="total-section">
      <p class="total-label">Total Value</p>
      <p id="total-value" class="total-value">—</p>
      <div id="change-row" class="change-row">
        <span id="change-badge" class="change-badge">—</span>
        <span class="change-label">24h</span>
      </div>
    </section>

    <!-- Divider -->
    <div class="divider"></div>

    <!-- Top holdings -->
    <section class="holdings-section">
      <p class="section-title">Top Holdings</p>
      <div id="holdings-list" class="holdings-list">
        <!-- Populated by popup.js -->
      </div>
    </section>

    <!-- Footer -->
    <footer class="popup-footer">
      <p id="last-synced" class="last-synced">—</p>
      <button id="btn-open-app" class="btn-primary">Open WalletLens</button>
    </footer>
  </div>

  <!-- ── Loading state ── -->
  <div id="loading" class="state-panel">
    <div class="spinner" aria-label="Loading…"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
