name: WalletLens X Post Agent

# Claude writes one on-brand $LENZ/WalletLens post daily.
#   • With X_API_* secrets set → auto-posts to @wallet_lens.
#   • Without them → opens a GitHub Issue with the draft for you to post manually.
# Replies/engagement stay human (automating those risks an X suspension).
#
# Secrets: ANTHROPIC_API_KEY (required); X_API_KEY, X_API_SECRET,
#          X_ACCESS_TOKEN, X_ACCESS_SECRET (optional, enables auto-post).

on:
  # Manual only — the dedicated $LENZ social agent (lenz-social.yml) is the primary
  # daily poster (it posts an image + text). Run this text-only agent on demand.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  post-x:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Generate & post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: node promo/post-x-agent.mjs
      - name: Write draft to step summary
        if: ${{ hashFiles('promo/x-post.json') != '' }}
        run: |
          echo "## 🐦 X Post Draft" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          node -e "const j=require('./promo/x-post.json'); console.log(j.body||j.title||JSON.stringify(j,null,2))" >> $GITHUB_STEP_SUMMARY
          echo "Draft written to step summary (no issue created)."
