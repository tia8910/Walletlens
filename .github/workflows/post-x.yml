name: WalletLens X Post Agent

# Claude writes one on-brand $LENZ/WalletLens post daily.
#   • With X_API_* secrets set → auto-posts to @wallet_lens.
#   • Without them → opens a GitHub Issue with the draft for you to post manually.
# Replies/engagement stay human (automating those risks an X suspension).
#
# Secrets: ANTHROPIC_API_KEY (required); X_API_KEY, X_API_SECRET,
#          X_ACCESS_TOKEN, X_ACCESS_SECRET (optional, enables auto-post).

on:
  schedule:
    - cron: '0 14 * * *'   # daily 14:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  post-x:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Generate & post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: node promo/post-x-agent.mjs
      - name: Open review issue (draft mode only)
        if: ${{ hashFiles('promo/x-post.json') != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues" \
            -d @promo/x-post.json > /dev/null \
            && echo "X draft issue created."
