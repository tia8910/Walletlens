name: WalletLens Thread Generator

# Generates a weekly educational Twitter/X thread about personal finance /
# portfolio tracking / crypto that mentions WalletLens naturally.
# The ready-to-post thread is delivered as a GitHub Issue for human review.
#
# Required secret: ANTHROPIC_API_KEY

on:
  schedule:
    - cron: '0 10 * * 3'   # Every Wednesday 10:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate-thread:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate thread
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node promo/generate-thread.mjs

      - name: Write draft to step summary
        if: ${{ hashFiles('promo/thread.json') != '' }}
        run: |
          echo "## 🧵 Weekly Thread Draft" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          node -e "const j=require('./promo/thread.json'); console.log(j.body||j.title||JSON.stringify(j,null,2))" >> $GITHUB_STEP_SUMMARY
          echo "Draft written to step summary (no issue created)."
