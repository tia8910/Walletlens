name: Build Signed AAB & APK

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. 1.9.1)'
        required: true
        type: string
      version_code:
        description: 'Version code (integer, must be higher than the last Play upload)'
        required: true
        type: number

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true

      # The keystore and its credentials live ONLY in GitHub secrets:
      #   KEYSTORE_BASE64   – base64 of the upload keystore
      #   KEYSTORE_PASSWORD – keystore password
      #   KEY_ALIAS         – key alias
      #   KEY_PASSWORD      – key password
      # There is deliberately no checked-in fallback: a missing secret must
      # fail the build rather than silently sign with a compromised key.
      - name: Decode signing keystore from secret
        run: |
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "::error::KEYSTORE_BASE64 secret is not set. Add the upload keystore as a base64 GitHub secret (never commit it)."
            exit 1
          fi
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > walletlens_source/release_package/signingKey.keystore

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > walletlens_source/release_package/local.properties

      - name: Update version in build.gradle
        working-directory: walletlens_source/release_package
        run: |
          sed -i "s/versionCode [0-9]*/versionCode ${{ github.event.inputs.version_code }}/" app/build.gradle
          sed -i "s/versionName \"[^\"]*\"/versionName \"${{ github.event.inputs.version_name }}\"/" app/build.gradle
          echo "Updated to versionCode=${{ github.event.inputs.version_code }}, versionName=${{ github.event.inputs.version_name }}"

      - name: Grant execute permission for gradlew
        working-directory: walletlens_source/release_package
        run: chmod +x gradlew

      - name: Build signed release AAB
        working-directory: walletlens_source/release_package
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/signingKey.keystore \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      - name: Build signed release APK
        working-directory: walletlens_source/release_package
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/signingKey.keystore \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      # Print the signing certificate's SHA-256 so it can be compared against
      # client/public/.well-known/assetlinks.json. If this fingerprint is not
      # in that file, TWA verification fails for this build: the app shows a
      # URL bar and web notifications are attributed to Chrome instead of the
      # app (notification delegation requires verification).
      - name: Print signing cert SHA-256 (must be in assetlinks.json)
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        working-directory: walletlens_source/release_package
        run: |
          echo "── keystore certificate ──"
          keytool -list -v -keystore signingKey.keystore \
            -alias "$KEY_ALIAS" -storepass "$KEYSTORE_PASSWORD" \
            | grep -E "SHA256:|Alias" || true
          echo "── APK signer (authoritative) ──"
          APKSIGNER=$(find $ANDROID_HOME/build-tools -name apksigner | sort -V | tail -1)
          "$APKSIGNER" verify --print-certs app/build/outputs/apk/release/app-release.apk \
            | grep -i "SHA-256" || true

      - name: Upload signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: WalletLens-v${{ github.event.inputs.version_name }}-signed.aab
          path: walletlens_source/release_package/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: WalletLens-v${{ github.event.inputs.version_name }}-signed.apk
          path: walletlens_source/release_package/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Upload ProGuard mapping (for crash debugging)
        uses: actions/upload-artifact@v4
        with:
          name: WalletLens-v${{ github.event.inputs.version_name }}-mapping.txt
          path: walletlens_source/release_package/app/build/outputs/mapping/release/mapping.txt
          if-no-files-found: ignore
