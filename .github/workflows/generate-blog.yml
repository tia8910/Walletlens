name: Generate SEO Blog Post

# Fully automated content/SEO agent: once a week Claude writes a fresh, original
# long-form article into client/src/data/blogPosts.js. The commit to main then
# triggers the Deploy workflow, whose prerender step turns the post into
# crawlable static HTML and refreshes sitemap.xml — so new SEO content ships
# with zero human involvement.
#
# Requires repo secret ANTHROPIC_API_KEY (Settings → Secrets and variables →
# Actions). The key stays a secret — it is never written to the repo.

on:
  schedule:
    - cron: '0 9 * * 1'   # every Monday 09:00 UTC
  workflow_dispatch:        # allow manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: generate-blog
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate a new blog post with Claude
        working-directory: ./client
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-blog-post.mjs

      - name: Commit new post
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add client/src/data/blogPosts.js
          # Only commit if the generator actually added a post. No [skip ci] —
          # we WANT the Deploy workflow to run, prerender and publish it.
          git diff --staged --quiet || git commit -m "content: add weekly SEO blog post"
          git push
