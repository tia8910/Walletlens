name: WalletLens Launch Copy Generator

# One-time script that generates ready-to-post copy for:
#   • Show HN (Hacker News)
#   • Product Hunt (tagline, description, maker first comment)
#   • IndieHackers (title + intro paragraph)
#
# Trigger manually via "Run workflow" in the Actions tab.
# The copy is delivered as a GitHub Issue for human review and editing.
#
# Required secret: ANTHROPIC_API_KEY

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate-launch-copy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate launch copy
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node promo/launch-copy.mjs

      - name: Write draft to step summary
        if: ${{ hashFiles('promo/launch-copy.json') != '' }}
        run: |
          echo "## 🚀 Launch Copy Draft" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          node -e "const j=require('./promo/launch-copy.json'); console.log(j.body||j.title||JSON.stringify(j,null,2))" >> $GITHUB_STEP_SUMMARY
          echo "Draft written to step summary (no issue created)."
