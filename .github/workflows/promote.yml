name: WalletLens Promotion Agent

# Discovers Reddit posts asking about net-worth / portfolio / investment trackers
# and drafts honest, helpful replies for a human to review and post MANUALLY
# (it never posts anything itself). Drafts are delivered as a GitHub Issue.
#
# Required secret: ANTHROPIC_API_KEY
# Optional secrets: REDDIT_CLIENT_ID, REDDIT_CLIENT_SECRET (more reliable search)

on:
  schedule:
    - cron: '0 10 * * 1,4'   # Monday & Thursday, 10:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: promote-agent
  cancel-in-progress: false

jobs:
  discover-and-draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Find posts and draft replies
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
        run: node promo/find-and-draft.mjs

      - name: Commit dedupe state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add promo/seen.json
          # [skip ci] so this doesn't trigger the site Deploy workflow.
          git diff --staged --quiet || git commit -m "chore: update promo seen-state [skip ci]"
          git push

      - name: Open review issue (if any drafts)
        if: ${{ hashFiles('promo/issue.json') != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues" \
            -d @promo/issue.json > /dev/null \
            && echo "Review issue created."
