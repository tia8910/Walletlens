name: WalletLens Promotion Agent

# Uses Claude with built-in web search to find Reddit posts asking about
# net-worth / portfolio / investment trackers, then drafts honest, helpful
# replies for a human to review and post MANUALLY (never auto-posts).
# Drafts are delivered as a GitHub Issue.
#
# Required secret: ANTHROPIC_API_KEY (no Reddit credentials needed)

on:
  schedule:
    - cron: '0 10 * * 1,4'   # Monday & Thursday, 10:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: promote-agent
  cancel-in-progress: false

jobs:
  discover-and-draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Find posts and draft replies
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node promo/find-and-draft.mjs

      - name: Commit dedupe state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add promo/seen.json
          # [skip ci] so this doesn't trigger the site Deploy workflow.
          git diff --staged --quiet || git commit -m "chore: update promo seen-state [skip ci]"
          git push

      - name: Open review issue (if any drafts)
        if: ${{ hashFiles('promo/issue.json') != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Add social-draft label so these don't clutter the real bug/feature issues
          node -e "
            const fs = require('fs');
            const j = JSON.parse(fs.readFileSync('promo/issue.json','utf8'));
            j.labels = ['social-draft'];
            fs.writeFileSync('promo/issue.json', JSON.stringify(j));
          "
          curl -sf -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues" \
            -d @promo/issue.json > /dev/null \
            && echo "Review issue created (social-draft label applied)."
