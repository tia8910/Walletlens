name: WalletLens YouTube Comment Agent

# Finds YouTube comments on portfolio/tracker videos where WalletLens
# would be a helpful reply — drafts them for human review as a GitHub Issue.
# Never posts automatically.
#
# Required secrets: ANTHROPIC_API_KEY, YOUTUBE_API_KEY

on:
  schedule:
    - cron: '0 10 * * 5'   # Every Friday 10:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  find-and-draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Find comments and draft replies
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: node promo/youtube-comments.mjs

      - name: Open review issue (if any drafts)
        if: ${{ hashFiles('promo/youtube-issue.json') != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Add social-draft label so these don't clutter the real bug/feature issues
          node -e "
            const fs = require('fs');
            const j = JSON.parse(fs.readFileSync('promo/youtube-issue.json','utf8'));
            j.labels = ['social-draft'];
            fs.writeFileSync('promo/youtube-issue.json', JSON.stringify(j));
          "
          curl -sf -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues" \
            -d @promo/youtube-issue.json > /dev/null \
            && echo "Review issue created (social-draft label applied)."
