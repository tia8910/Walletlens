name: Update Stock Prices

on:
  schedule:
    # Every 30 minutes Mon-Fri during US market hours (13:30–21:00 UTC)
    - cron: '*/30 13-21 * * 1-5'
    # Once at market open (pre-market snapshot)
    - cron: '0 13 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch stock prices from Stooq
        run: |
          python3 << 'EOF'
          import urllib.request, csv, json, io, time

          TICKERS = [
            "AAPL","MSFT","NVDA","GOOGL","META","AMZN","TSLA","AVGO","ORCL","CRM",
            "AMD","INTC","QCOM","IBM","ADBE","NOW","PLTR","NET","SNOW","BRK.B",
            "JPM","V","MA","BAC","GS","MS","WFC","AXP","C","COIN","HOOD",
            "LLY","UNH","JNJ","ABBV","PFE","MRK","NVO",
            "WMT","COST","MCD","NKE","SBUX","KO","PEP","TGT",
            "XOM","CVX","COP","OXY",
            "SPY","QQQ","IWM","DIA","VOO","VTI","GLD","TLT","ARKK","SOXX"
          ]

          result = {}
          errors = []

          # Stooq batch: fetch all tickers in one request
          symbols = ",".join(t.lower() + ".us" for t in TICKERS)
          url = f"https://stooq.com/q/l/?s={symbols}&f=sd2t2ohlcvn&h&e=csv"

          try:
            req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
            with urllib.request.urlopen(req, timeout=30) as r:
              text = r.read().decode("utf-8")
            reader = csv.DictReader(io.StringIO(text))
            for row in reader:
              sym = row.get("Symbol", "").upper().replace(".US", "")
              close = float(row.get("Close", 0) or 0)
              open_ = float(row.get("Open", 0) or 0)
              if close > 0:
                change = ((close - open_) / open_ * 100) if open_ > 0 else 0
                result[f"stock:{sym.lower()}"] = {
                  "usd": round(close, 4),
                  "usd_24h_change": round(change, 4)
                }
              else:
                errors.append(sym)
          except Exception as e:
            print(f"Stooq batch failed: {e}")
            errors = TICKERS

          # Retry failed tickers one by one
          for sym in errors[:10]:  # limit retries
            try:
              url = f"https://stooq.com/q/l/?s={sym.lower()}.us&f=sd2t2ohlcvn&h&e=csv"
              req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
              with urllib.request.urlopen(req, timeout=10) as r:
                text = r.read().decode("utf-8")
              reader = csv.DictReader(io.StringIO(text))
              for row in reader:
                close = float(row.get("Close", 0) or 0)
                open_ = float(row.get("Open", 0) or 0)
                if close > 0:
                  change = ((close - open_) / open_ * 100) if open_ > 0 else 0
                  result[f"stock:{sym.lower()}"] = {
                    "usd": round(close, 4),
                    "usd_24h_change": round(change, 4)
                  }
              time.sleep(0.5)
            except Exception as e:
              print(f"  retry failed for {sym}: {e}")

          output = {
            "updated": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()),
            "count": len(result),
            "prices": result
          }

          with open("stock-prices.json", "w") as f:
            json.dump(output, f)

          print(f"Fetched {len(result)}/{len(TICKERS)} tickers")
          if result:
            sample = list(result.items())[:3]
            for k, v in sample:
              print(f"  {k}: ${v['usd']} ({v['usd_24h_change']:+.2f}%)")
          EOF

      - name: Commit updated prices
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stock-prices.json
          git diff --staged --quiet || git commit -m "chore: update stock prices [skip ci]"
          git push
