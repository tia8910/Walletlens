name: Update Stock Prices

on:
  schedule:
    # Three snapshots per US market day (open / midday / close). The site is
    # served by Cloudflare Pages from main, so the file lives in client/public/
    # and each update commits without [skip ci] so it actually deploys,
    # without burning the Pages build quota.
    - cron: '35 13,17,21 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch stock prices from Stooq
        run: |
          python3 << 'EOF'
          import urllib.request, csv, json, io, time

          TICKERS = [
            # ── Mega Cap Tech ──
            "AAPL","MSFT","NVDA","GOOGL","META","AMZN","TSLA","AVGO","ORCL","CRM",
            "AMD","INTC","QCOM","IBM","ADBE","NOW","PLTR","SNOW",
            # ── AI / Cloud / SaaS ──
            "NET","DDOG","CRWD","ZS","APP","TTD","SMCI","ARM","ASML","TSM","NFLX","MSTR",
            # ── Mobility / Social / Consumer Internet ──
            "UBER","LYFT","ABNB","DASH","SNAP","PINS","SPOT","RBLX","ZM","AFRM",
            # ── China / Asia Tech ──
            "BABA","PDD","JD",
            # ── Finance ──
            "BRK.B","JPM","V","MA","BAC","GS","MS","WFC","AXP","C","COIN","HOOD",
            "SQ","PYPL","SOFI","NU","SCHW","BLK","PGR","DKNG",
            # ── Healthcare ──
            "LLY","UNH","JNJ","ABBV","PFE","MRK","NVO",
            "TMO","ISRG","ABT","AMGN","GILD","VRTX","REGN","MRNA",
            # ── Consumer / Media ──
            "WMT","COST","MCD","NKE","SBUX","KO","PEP","TGT",
            "DIS","CMCSA","LULU","HD","LOW",
            # ── Energy ──
            "XOM","CVX","COP","OXY","NEE","FSLR","ENPH",
            # ── Crypto Mining ──
            "RIOT","MARA","CORZ","HUT",
            # ── Defense / Industrial ──
            "LMT","RTX","BA","GE","CAT","DE",
            # ── ETFs ──
            "SPY","QQQ","IWM","DIA","VOO","VTI","GLD","TLT","ARKK","SOXX",
            "XLK","XLF","XLV","XLC","SCHD","JEPI","JEPQ",
          ]

          result = {}
          errors = []

          # Stooq batch: fetch all tickers in one request
          symbols = ",".join(t.lower() + ".us" for t in TICKERS)
          url = f"https://stooq.com/q/l/?s={symbols}&f=sd2t2ohlcvn&h&e=csv"

          try:
            req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
            with urllib.request.urlopen(req, timeout=30) as r:
              text = r.read().decode("utf-8")
            reader = csv.DictReader(io.StringIO(text))
            for row in reader:
              sym = row.get("Symbol", "").upper().replace(".US", "")
              close = float(row.get("Close", 0) or 0)
              open_ = float(row.get("Open", 0) or 0)
              if close > 0:
                change = ((close - open_) / open_ * 100) if open_ > 0 else 0
                result[f"stock:{sym.lower()}"] = {
                  "usd": round(close, 4),
                  "usd_24h_change": round(change, 4)
                }
              else:
                errors.append(sym)
          except Exception as e:
            print(f"Stooq batch failed: {e}")
            errors = TICKERS

          # Retry failed tickers one by one
          for sym in errors[:10]:  # limit retries
            try:
              url = f"https://stooq.com/q/l/?s={sym.lower()}.us&f=sd2t2ohlcvn&h&e=csv"
              req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
              with urllib.request.urlopen(req, timeout=10) as r:
                text = r.read().decode("utf-8")
              reader = csv.DictReader(io.StringIO(text))
              for row in reader:
                close = float(row.get("Close", 0) or 0)
                open_ = float(row.get("Open", 0) or 0)
                if close > 0:
                  change = ((close - open_) / open_ * 100) if open_ > 0 else 0
                  result[f"stock:{sym.lower()}"] = {
                    "usd": round(close, 4),
                    "usd_24h_change": round(change, 4)
                  }
              time.sleep(0.5)
            except Exception as e:
              print(f"  retry failed for {sym}: {e}")

          # ── Fetch Binance bStock prices (tokenized securities, 24/7) ──
          import json as _json
          BSTOCKS = {
            "nvdab": "NVDABUSDT",
            "tslab": "TSLAB" + "USDT",
            "mubb":  "MUBB"  + "USDT",
            "sndkb": "SNDKB" + "USDT",
            "crclb": "CRCLB" + "USDT",
          }
          for ticker_lower, symbol in BSTOCKS.items():
            try:
              burl = f"https://api.binance.com/api/v3/ticker/24hr?symbol={symbol}"
              breq = urllib.request.Request(burl, headers={"User-Agent": "Mozilla/5.0"})
              with urllib.request.urlopen(breq, timeout=10) as br:
                bdata = _json.loads(br.read().decode("utf-8"))
              price = float(bdata.get("lastPrice", 0) or 0)
              pct   = float(bdata.get("priceChangePercent", 0) or 0)
              if price > 0:
                result[f"stock:{ticker_lower}"] = {
                  "usd": round(price, 4),
                  "usd_24h_change": round(pct, 4)
                }
                print(f"  bStock {ticker_lower}: ${price:.4f} ({pct:+.2f}%)")
            except Exception as e:
              print(f"  Binance bStock {ticker_lower} failed: {e}")

          output = {
            "updated": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()),
            "count": len(result),
            "prices": result
          }

          with open("client/public/stock-prices.json", "w") as f:
            json.dump(output, f)

          print(f"Fetched {len(result)}/{len(TICKERS)} tickers")
          if result:
            sample = list(result.items())[:3]
            for k, v in sample:
              print(f"  {k}: ${v['usd']} ({v['usd_24h_change']:+.2f}%)")
          EOF

      - name: Commit updated prices
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add client/public/stock-prices.json
          git diff --staged --quiet || git commit -m "chore: update stock prices"
          git push
