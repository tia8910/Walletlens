<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Brand base gradient: #07140e → #040f0a → #020b07 -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="40%" y2="100%">
      <stop offset="0%"   style="stop-color:#07140e"/>
      <stop offset="50%"  style="stop-color:#040f0a"/>
      <stop offset="100%" style="stop-color:#020b07"/>
    </linearGradient>
    <!-- Emerald top-center glow -->
    <radialGradient id="topGlow" cx="50%" cy="6%" r="75%">
      <stop offset="0%"   style="stop-color:rgba(16,185,129,0.16)"/>
      <stop offset="100%" style="stop-color:rgba(16,185,129,0)"/>
    </radialGradient>
    <!-- Aurora orbs -->
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:rgba(16,185,129,0.11)"/>
      <stop offset="100%" style="stop-color:rgba(16,185,129,0)"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:rgba(45,212,191,0.08)"/>
      <stop offset="100%" style="stop-color:rgba(45,212,191,0)"/>
    </radialGradient>
    <radialGradient id="orb3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:rgba(56,189,248,0.06)"/>
      <stop offset="100%" style="stop-color:rgba(56,189,248,0)"/>
    </radialGradient>
    <!-- Curve fills -->
    <linearGradient id="curveFill0" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:rgba(16,185,129,0.20)"/>
      <stop offset="100%" style="stop-color:rgba(16,185,129,0)"/>
    </linearGradient>
    <linearGradient id="curveFill1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:rgba(45,212,191,0.12)"/>
      <stop offset="100%" style="stop-color:rgba(45,212,191,0)"/>
    </linearGradient>
    <!-- Dark scrim (vignette) -->
    <radialGradient id="scrim" cx="50%" cy="45%" r="95%">
      <stop offset="0%"   style="stop-color:rgba(2,11,7,0)"/>
      <stop offset="70%"  style="stop-color:rgba(2,11,7,0.18)"/>
      <stop offset="100%" style="stop-color:rgba(2,11,7,0.45)"/>
    </radialGradient>
    <!-- Logo ring -->
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <!-- CTA button gradient -->
    <linearGradient id="btn" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <!-- Glow filter for headline accent -->
    <filter id="glowText" x="-5%" y="-20%" width="110%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Glow filter for curve -->
    <filter id="curveGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── Background ── -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#topGlow)"/>

  <!-- Aurora orbs (static snapshot) -->
  <ellipse cx="200" cy="280" rx="420" ry="340" fill="url(#orb1)"/>
  <ellipse cx="950" cy="180" rx="360" ry="300" fill="url(#orb2)"/>
  <ellipse cx="650" cy="420" rx="300" ry="260" fill="url(#orb3)"/>

  <!-- ── Equity curves (static, match landing page shape) ── -->
  <!-- Back curve (teal, layer 1) — base y≈93% of 630≈586, gentle trend up -->
  <path d="
    M0,592 C60,605 120,598 180,614 C240,628 300,615 360,607
    C420,598 480,610 540,600 C600,590 660,598 720,582
    C780,566 840,578 900,558 C960,540 1020,550 1080,534 C1120,524 1160,532 1200,520
    L1200,630 L0,630 Z"
    fill="url(#curveFill1)"/>
  <path d="
    M0,592 C60,605 120,598 180,614 C240,628 300,615 360,607
    C420,598 480,610 540,600 C600,590 660,598 720,582
    C780,566 840,578 900,558 C960,540 1020,550 1080,534 C1120,524 1160,532 1200,520"
    fill="none" stroke="rgba(45,212,191,0.55)" stroke-width="1.8"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Front curve (emerald, layer 0) — base y≈86% of 630≈542, more prominent waves -->
  <path d="
    M0,548 C50,560 100,575 160,580 C220,585 280,572 340,576
    C400,580 450,565 510,548 C560,534 610,540 660,524
    C710,508 760,516 820,498 C870,483 920,490 970,472
    C1020,456 1070,464 1120,450 C1150,443 1175,448 1200,440
    L1200,630 L0,630 Z"
    fill="url(#curveFill0)"/>
  <path d="
    M0,548 C50,560 100,575 160,580 C220,585 280,572 340,576
    C400,580 450,565 510,548 C560,534 610,540 660,524
    C710,508 760,516 820,498 C870,483 920,490 970,472
    C1020,456 1070,464 1120,450 C1150,443 1175,448 1200,440"
    fill="none" stroke="rgba(52,211,153,0.95)" stroke-width="2.8"
    stroke-linecap="round" stroke-linejoin="round"
    filter="url(#curveGlow)"/>

  <!-- Pulse dot at front curve tip -->
  <circle cx="1200" cy="440" r="5" fill="#34d399" opacity="0.9"/>
  <circle cx="1200" cy="440" r="9" fill="rgba(52,211,153,0.25)"/>

  <!-- Floating gain labels (like the landing page) -->
  <text x="68" y="530" font-family="'Helvetica Neue',Arial,sans-serif" font-size="14" font-weight="700" fill="#34d399" opacity="0.7">+4.0%</text>
  <text x="1090" y="462" font-family="'Helvetica Neue',Arial,sans-serif" font-size="14" font-weight="700" fill="#34d399" opacity="0.7">+8.3%</text>

  <!-- Dark scrim so text stays crisp -->
  <rect width="1200" height="630" fill="url(#scrim)"/>

  <!-- ── Logo — top-left ── -->
  <g transform="translate(52, 44)">
    <circle cx="30" cy="30" r="28" fill="none" stroke="url(#ring)" stroke-width="1.8" opacity="0.5"/>
    <circle cx="30" cy="30" r="20" fill="#071a0c" stroke="url(#ring)" stroke-width="1.2"/>
    <g fill="none" transform="translate(30,30) scale(0.56) translate(-25,-30.5)">
      <circle cx="27" cy="25" r="19" stroke="#34d399" stroke-width="5"/>
      <circle cx="40.5" cy="11.5" r="3.8" fill="#6ee7b7"/>
      <rect x="14.5" y="26.5" width="5" height="7.5" rx="1.2" fill="#34d399"/>
      <rect x="21.5" y="21" width="5" height="13" rx="1.2" fill="#34d399"/>
      <rect x="28.5" y="15.5" width="5" height="18.5" rx="1.2" fill="#34d399"/>
      <line x1="13.5" y1="39" x2="4" y2="55" stroke="#34d399" stroke-width="5" stroke-linecap="round"/>
    </g>
  </g>
  <!-- Brand name -->
  <text x="100" y="66" font-family="'Helvetica Neue',Arial,sans-serif" font-weight="800" font-size="26">
    <tspan fill="white">WalletLens</tspan><tspan fill="#34d399">.</tspan><tspan fill="#34d399">live</tspan>
  </text>
  <!-- Tagline -->
  <text x="100" y="86" font-family="'Helvetica Neue',Arial,sans-serif" font-weight="600" font-size="10.5" fill="#34d399" opacity="0.8" letter-spacing="2.5">SEE YOUR WEALTH CLEARLY</text>
  <!-- TRACK | ANALYZE | GROW -->
  <g font-family="'Helvetica Neue',Arial,sans-serif" font-size="10" font-weight="600" letter-spacing="1.2" fill="rgba(255,255,255,0.40)">
    <text x="100" y="103">TRACK</text>
    <text x="150" y="103" fill="rgba(255,255,255,0.18)">|</text>
    <text x="159" y="103">ANALYZE</text>
    <text x="225" y="103" fill="rgba(255,255,255,0.18)">|</text>
    <text x="234" y="103">GROW</text>
  </g>

  <!-- ── Hero headline — centered ── -->
  <!-- Line 1: white -->
  <text x="600" y="222"
    font-family="'Helvetica Neue',Arial,sans-serif" font-weight="800" font-size="72"
    fill="white" text-anchor="middle" letter-spacing="-2">
    You deserve to know
  </text>
  <!-- Line 2: emerald green with glow -->
  <text x="600" y="310"
    font-family="'Helvetica Neue',Arial,sans-serif" font-weight="800" font-size="72"
    fill="#34d399" text-anchor="middle" letter-spacing="-2"
    filter="url(#glowText)">
    your real P&amp;L in seconds.
  </text>

  <!-- ── Sub text — centered ── -->
  <text x="600" y="360"
    font-family="'Helvetica Neue',Arial,sans-serif" font-size="18" font-weight="400"
    fill="rgba(255,255,255,0.60)" text-anchor="middle" letter-spacing="0.1">
    Most investors are flying blind — guessing P&amp;L, missing rug pulls,
  </text>
  <text x="600" y="384"
    font-family="'Helvetica Neue',Arial,sans-serif" font-size="18" font-weight="400"
    fill="rgba(255,255,255,0.60)" text-anchor="middle" letter-spacing="0.1">
    holding underwater positions without a plan.
  </text>
  <!-- Privacy caption -->
  <text x="600" y="415"
    font-family="'Helvetica Neue',Arial,sans-serif" font-size="13.5" font-weight="400"
    fill="rgba(255,255,255,0.32)" text-anchor="middle" letter-spacing="0.2">
    Your data never leaves your device.
  </text>

  <!-- ── CTAs — centered ── -->
  <!-- Primary CTA -->
  <rect x="376" y="435" width="292" height="54" rx="27" fill="url(#btn)"/>
  <text x="522" y="468" font-family="'Helvetica Neue',Arial,sans-serif" font-weight="700" font-size="17"
    fill="#020b07" text-anchor="middle" letter-spacing="0.2">
    Track your net worth →
  </text>
  <!-- Ghost CTA 1 -->
  <rect x="676" y="435" width="176" height="54" rx="27" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.18)" stroke-width="1.2"/>
  <text x="764" y="468" font-family="'Helvetica Neue',Arial,sans-serif" font-weight="600" font-size="16"
    fill="rgba(255,255,255,0.80)" text-anchor="middle">
    Create wallet
  </text>
  <!-- Ghost CTA 2 -->
  <rect x="376" y="499" width="476" height="54" rx="27" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.18)" stroke-width="1.2"/>
  <text x="614" y="532" font-family="'Helvetica Neue',Arial,sans-serif" font-weight="600" font-size="16"
    fill="rgba(255,255,255,0.80)" text-anchor="middle">
    Evaluate your portfolio
  </text>

  <!-- "or Add to Chrome" row -->
  <text x="600" y="578"
    font-family="'Helvetica Neue',Arial,sans-serif" font-size="13" font-weight="400"
    fill="rgba(255,255,255,0.32)" text-anchor="middle">
    or <tspan fill="#34d399" font-weight="600">Add to Chrome</tspan> — free Chrome &amp; Edge extension, no signup
  </text>

  <!-- Trust pills -->
  <g font-family="'Helvetica Neue',Arial,sans-serif" font-size="12" font-weight="600">
    <rect x="293" y="596" width="168" height="26" rx="13" fill="rgba(52,211,153,0.08)" stroke="rgba(52,211,153,0.25)" stroke-width="1"/>
    <text x="377" y="614" text-anchor="middle" fill="rgba(255,255,255,0.55)">🔒 No wallet connection</text>

    <rect x="469" y="596" width="180" height="26" rx="13" fill="rgba(52,211,153,0.08)" stroke="rgba(52,211,153,0.25)" stroke-width="1"/>
    <text x="559" y="614" text-anchor="middle" fill="rgba(255,255,255,0.55)">🖥️ No server — 100% local</text>

    <rect x="657" y="596" width="152" height="26" rx="13" fill="rgba(52,211,153,0.08)" stroke="rgba(52,211,153,0.25)" stroke-width="1"/>
    <text x="733" y="614" text-anchor="middle" fill="rgba(255,255,255,0.55)">🎙️ Import by voice</text>
  </g>

  <!-- Bottom glow bar -->
  <rect x="0" y="627" width="1200" height="3" fill="url(#ring)" opacity="0.4"/>
</svg>
