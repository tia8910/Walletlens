    <!-- Structured data — FAQPage. Optimised for AEO (Google AI Overviews,
         Perplexity, ChatGPT browsing). Each Q is a likely query the
         answer engine will be asked, with a crisp citable answer. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Is WalletLens free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. WalletLens is 100% free with no account, no sign-up, and no paid tiers. It runs entirely in your browser; your data stays on your device."
          }
        },
        {
          "@type": "Question",
          "name": "Does WalletLens track stocks and gold, or only crypto?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "WalletLens tracks crypto (live prices via CoinGecko/Binance/CoinCap), US stocks (Stooq), gold and silver (Gold-API), fiat currencies via live FX, plus user-defined bonds and other assets — all in one dashboard."
          }
        },
        {
          "@type": "Question",
          "name": "How does WalletLens handle privacy?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "WalletLens is local-first. Every transaction, holding, and target is stored only in your browser's localStorage. There is no server-side database and no account. You can export a single backup code to move data between devices."
          }
        },
        {
          "@type": "Question",
          "name": "What is a multi-target sell plan?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A sell plan lets you set multiple price targets per asset, each with a quantity to sell at that price. WalletLens shows a progress bar against the live price so you know exactly when each tier is hit and what the projected proceeds are."
          }
        },
        {
          "@type": "Question",
          "name": "Can WalletLens analyse my whole portfolio with AI?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. The AI Portfolio Analysis card scores your health, diversification, risk, and momentum, computes Sharpe-like ratio, max drawdown, annualised volatility, P&L attribution, asset-class and market-cap splits, plus stress-tests scenarios where BTC moves ±10% / ±20%."
          }
        },
        {
          "@type": "Question",
          "name": "Is WalletLens installable as an app?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes — WalletLens is a Progressive Web App (PWA). On iOS, Android, and desktop browsers you can install it to your home screen / dock and it opens offline-first after the first visit."
          }
        },
        {
          "@type": "Question",
          "name": "How is WalletLens different from CoinTracker, CoinStats, or Delta?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "WalletLens is free with no account and no data collection, tracks all major asset classes (not just crypto), and adds AI portfolio analysis with stress tests, multi-target sell plans, and a live whale tracker — without any paid tier."
          }
        }
      ]
    }
    </script>

    <script>
      // SPA deep-link restore (rafgraph/spa-github-pages): 404.html encodes the
      // original path as a single ?/foo/bar segment; this rewrites history back.
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) { return s.replace(/~and~/g, '&') })
            .join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
