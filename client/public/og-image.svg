  <!-- Body copy -->
  <text x="64" y="348" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.58)" font-weight="400" letter-spacing="0.1">Most investors are flying blind — guessing P&amp;L, missing rug pulls,</text>
  <text x="64" y="370" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.58)" font-weight="400" letter-spacing="0.1">holding underwater positions without a plan.</text>

  <!-- Privacy note -->
  <text x="64" y="406" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13.5" fill="rgba(255,255,255,0.35)" font-weight="500" letter-spacing="0.2">Free · Private · No account needed · Your data never leaves your device.</text>

