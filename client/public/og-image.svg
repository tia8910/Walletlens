<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#040d0a"/>
      <stop offset="50%" style="stop-color:#061410"/>
      <stop offset="100%" style="stop-color:#02080a"/>
    </linearGradient>

    <!-- Green glow gradient -->
    <radialGradient id="glow1" cx="30%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00ff8820;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00000000;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="30%" r="40%">
      <stop offset="0%" style="stop-color:#00c87315;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00000000;stop-opacity:0"/>
    </radialGradient>

    <!-- Logo ring gradient -->
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>

    <!-- Chart line gradient -->
    <linearGradient id="chartFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34d39940"/>
      <stop offset="100%" style="stop-color:#34d39900"/>
    </linearGradient>

    <!-- Card gradient -->
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d2018"/>
      <stop offset="100%" style="stop-color:#071410"/>
    </linearGradient>

    <filter id="blur1">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="glow-text">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient glows -->
  <rect width="1200" height="630" fill="url(#glow1)" filter="url(#blur1)"/>
  <rect width="1200" height="630" fill="url(#glow2)" filter="url(#blur1)"/>

  <!-- Grid lines -->
  <g opacity="0.04" stroke="#34d399" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
