  <!-- Particles -->
  <g fill="#34d399" opacity="0.25">
    <circle cx="70" cy="120" r="1.5"/>
    <circle cx="180" cy="80" r="2"/>
    <circle cx="310" cy="140" r="1.5"/>
    <circle cx="440" cy="60" r="2"/>
    <circle cx="1080" cy="90" r="2"/>
    <circle cx="1150" cy="180" r="1.5"/>
    <circle cx="50" cy="430" r="1.5"/>
