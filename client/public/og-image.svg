  </text>

  <!-- Tagline -->
  <text x="118" y="122" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="13" fill="#34d399" opacity="0.85" letter-spacing="3.5">SEE YOUR WEALTH CLEARLY</text>

