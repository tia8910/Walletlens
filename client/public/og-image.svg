<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#040e08"/>
      <stop offset="60%" style="stop-color:#061410"/>
      <stop offset="100%" style="stop-color:#030b06"/>
    </linearGradient>

    <radialGradient id="glow1" cx="25%" cy="55%" r="55%">
      <stop offset="0%" style="stop-color:#00c85328;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00000000;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="75%" cy="35%" r="40%">
      <stop offset="0%" style="stop-color:#00c85312;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00000000;stop-opacity:0"/>
    </radialGradient>

    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>

    <linearGradient id="chartFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34d39930"/>
      <stop offset="100%" style="stop-color:#34d39900"/>
    </linearGradient>
    <linearGradient id="chartFill2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34d39918"/>
      <stop offset="100%" style="stop-color:#34d39900"/>
    </linearGradient>

    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d2018"/>
      <stop offset="100%" style="stop-color:#071410"/>
    </linearGradient>

    <linearGradient id="btnGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>

    <filter id="blur1">
      <feGaussianBlur stdDeviation="45"/>
    </filter>
    <filter id="glow-text">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient glows -->
  <rect width="1200" height="630" fill="url(#glow1)" filter="url(#blur1)"/>
  <rect width="1200" height="630" fill="url(#glow2)" filter="url(#blur1)"/>

  <!-- Subtle grid -->
  <g opacity="0.03" stroke="#34d399" stroke-width="1">
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="314" x2="1200" y2="314"/>
    <line x1="0" y1="471" x2="1200" y2="471"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Background chart curves (full-width, like landing page) -->
  <path d="M0 520 C80 510 160 530 260 505 C360 480 440 490 540 465 C640 440 720 455 820 420 C920 385 1000 400 1100 370 L1200 355 L1200 630 L0 630 Z"
