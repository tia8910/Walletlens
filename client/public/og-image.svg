  <path d="M608 390 L648 376 L688 382 L728 366 L768 350 L808 360 L848 342 L888 328 L928 336 L968 312 L1008 300 L1048 284 L1088 290 L1128 272 L1148 264 L1148 406 L608 406 Z"
