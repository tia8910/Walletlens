  <line x1="608" y1="510" x2="1148" y2="510" stroke="#34d39910" stroke-width="1"/>
  <line x1="608" y1="548" x2="1148" y2="548" stroke="#34d39910" stroke-width="1"/>

  <!-- Bottom glow bar -->
