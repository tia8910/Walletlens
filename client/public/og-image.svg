    <text x="653" y="487" font-size="12.5" fill="white" font-weight="600">BTC</text>
    <text x="653" y="502" font-size="10.5" fill="rgba(255,255,255,0.38)">$83,420 · 0.218 units</text>
    <text x="1144" y="487" font-size="12.5" fill="white" font-weight="600" text-anchor="end">$18,185</text>
