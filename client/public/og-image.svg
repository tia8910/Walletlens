  <text x="616" y="140" font-family="'Helvetica Neue', Arial, sans-serif" font-size="40" fill="white" font-weight="700" letter-spacing="-1">$48,320.14</text>
  <text x="616" y="164" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13.5" fill="#34d399" font-weight="600">↑ $3,241.88 (+7.19%) all time</text>
