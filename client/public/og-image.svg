  <rect x="728" y="198" width="130" height="66" rx="11" fill="url(#card1)" stroke="#34d39914" stroke-width="1"/>
  <text x="793" y="220" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10.5" fill="rgba(255,255,255,0.38)" text-anchor="middle" letter-spacing="0.5">P&amp;L</text>
  <text x="793" y="248" font-family="'Helvetica Neue', Arial, sans-serif" font-size="19" fill="#34d399" font-weight="700" text-anchor="middle">+$3,242</text>

  <rect x="868" y="198" width="130" height="66" rx="11" fill="url(#card1)" stroke="#34d39914" stroke-width="1"/>
  <text x="933" y="220" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10.5" fill="rgba(255,255,255,0.38)" text-anchor="middle" letter-spacing="0.5">ASSETS</text>
  <text x="933" y="248" font-family="'Helvetica Neue', Arial, sans-serif" font-size="19" fill="white" font-weight="700" text-anchor="middle">10</text>

