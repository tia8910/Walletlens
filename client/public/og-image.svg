    <circle cx="220" cy="160" r="1.5"/>
    <circle cx="350" cy="60" r="2.5"/>
    <circle cx="500" cy="180" r="1.5"/>
    <circle cx="1050" cy="100" r="2"/>
    <circle cx="1120" cy="200" r="1.5"/>
    <circle cx="980" cy="520" r="2"/>
    <circle cx="150" cy="500" r="1.5"/>
    <circle cx="60" cy="400" r="2"/>
